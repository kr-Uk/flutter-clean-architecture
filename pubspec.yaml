name: more_app
description: "MORE - Fintech Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리 (Riverpod MVVM)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 네트워크
  dio: ^5.7.0
  retrofit: ^4.4.2

  # 로컬 저장소
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 라우팅
  go_router: ^14.8.1

  # 직렬화
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI / UX
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # 핀테크 관련
  fl_chart: ^0.70.2
  intl: ^0.20.2
  currency_text_input_formatter: ^2.2.5

  # 소셜 로그인
  kakao_flutter_sdk_user: ^1.9.6
  google_sign_in: ^6.2.2

  # 생체인증 / 보안
  local_auth: ^2.3.0

  # 환경변수
  flutter_dotenv: ^5.2.1

  # 유틸리티
  logger: ^2.5.0
  connectivity_plus: ^6.1.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  retrofit_generator: ^9.1.7
  riverpod_generator: ^2.6.3

  # 테스트
  mockito: ^5.4.5
  build_verify: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: MemomentKkukkukk
      fonts:
        - asset: assets/fonts/MemomentKkukkukk.otf
